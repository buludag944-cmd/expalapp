services:
  - type: web
    name: expal-api
    runtime: node
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
